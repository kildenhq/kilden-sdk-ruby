name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: kilden-runners
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.0", "3.1", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4
      # The unit suite includes the frozen-vector runners, which read the
      # spec checkout (no mock server needed).
      - uses: actions/checkout@v4
        with:
          repository: kildenhq/kilden-sdk-spec
          ref: main # pin to the spec tag this SDK implements once tagged
          path: kilden-sdk-spec
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test
        env:
          KILDEN_SPEC_DIR: ${{ github.workspace }}/kilden-sdk-spec

  lint:
    runs-on: kilden-runners
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rubocop

  # Spec conformance: boots kilden-sdk-spec's mock capture server and runs
  # the vector runners plus retry/gzip/flags/fork-safety behavior against it.
  integration:
    runs-on: kilden-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kildenhq/kilden-sdk-spec
          ref: main # pin to the spec tag this SDK implements once tagged
          path: kilden-sdk-spec
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: kilden-sdk-spec/mockserver/go.mod
      - run: bundle exec rake integration
        env:
          KILDEN_SPEC_DIR: ${{ github.workspace }}/kilden-sdk-spec
