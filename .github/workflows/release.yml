name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: freshworkstudio/kilden-sdk-spec
          ref: main
          path: kilden-sdk-spec
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rake test
        env:
          KILDEN_SPEC_DIR: ${{ github.workspace }}/kilden-sdk-spec
      - run: gem build kilden.gemspec
      - name: push to rubygems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          if [ -z "$GEM_HOST_API_KEY" ]; then
            echo "RUBYGEMS_API_KEY secret is not set — gem built but not published (see RELEASE.md)"
          else
            gem push kilden-*.gem
          fi
      - name: github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" kilden-*.gem --generate-notes --prerelease
