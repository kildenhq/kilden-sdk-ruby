name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: kildenhq/kilden-sdk-spec
          ref: main
          path: kilden-sdk-spec
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec rake test
        env:
          KILDEN_SPEC_DIR: ${{ github.workspace }}/kilden-sdk-spec
      - run: gem build kilden.gemspec
      - name: configure rubygems credentials (OIDC trusted publishing)
        # rubygems.org has this repo+workflow registered as the gem's
        # trusted publisher — no API key secret to rotate.
        uses: rubygems/configure-rubygems-credentials@v1
      - name: push to rubygems
        run: gem push kilden-*.gem
      - name: github release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" kilden-*.gem --generate-notes --prerelease
